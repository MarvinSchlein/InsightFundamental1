# .github/workflows/news_ingest.yml
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: 📰 News-Ingestion

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests openai pandas python-dotenv
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

    - name: Run news_ingest.py
      # in das Unterverzeichnis wechseln
      working-directory: InsightFundamental  
      env:
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      run: python backend/news_ingest.py

      - name: Commit & push updated CSV
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: ingest news"
          file_pattern: |
            data/latest_news.csv
            data/news_analysis_results.csv
