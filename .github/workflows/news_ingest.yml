# .github/workflows/news_ingest.yml
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 📰 News-Ingestion

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    # Erlaube dem integrierten GITHUB_TOKEN, in dein Repo zu schreiben
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run news_ingest.py
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python backend/news_ingest.py

      - name: Debug: show CSV head
        run: |
          echo "=== Inhalt der CSV nach Ingestion ==="
          ls -l frontend/data/news_analysis_results.csv || true
          head -n 10 frontend/data/news_analysis_results.csv || true

      - name: Commit & push updated CSV
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: hourly news ingestion"
          file_pattern:      "frontend/data/news_analysis_results.csv"
